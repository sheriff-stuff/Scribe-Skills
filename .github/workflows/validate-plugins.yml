# Validates this repo's plugin marketplace. Runs on every pull request so the
# required "validate" check is always reported and branch protection never
# deadlocks waiting for a path-filtered run that will not fire. Also runs on
# pushes to master that touch the manifest or shipped plugin content. Uses the
# canonical composite action from anthropics/claude-plugins-community, which
# installs the official `claude` CLI fresh each run and uses `claude plugin
# validate` as the source of truth for the marketplace schema. Mark this
# workflow's "validate" job as a required check on `master` in Settings →
# Branches to actually block merges.
name: Validate plugins

on:
  pull_request:
  push:
    branches: [master]
    paths:
      - '.claude-plugin/**'
      - 'skills/**'
      - 'agents/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: anthropics/claude-plugins-community/.github/actions/validate-plugins@f846a0bcb0e721b1f93d60e8b73e91dafc4a1e87
        with:
          marketplace-path: .claude-plugin/marketplace.json
          claude-cli-version: latest
