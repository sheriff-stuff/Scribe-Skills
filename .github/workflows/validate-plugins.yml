# Validates this repo's plugin marketplace on every PR that touches the
# manifest or any shipped skill content. Installs the official `claude` CLI
# via the self-contained installer and runs `claude plugin validate` as the
# source of truth for the marketplace schema. Mark this workflow's "validate"
# job as a required check on `master` in Settings → Branches to actually block
# merges.
name: Validate plugins

on:
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'skills/**'
      - '.github/workflows/validate-plugins.yml'
  push:
    branches: [master]
    paths:
      - '.claude-plugin/**'
      - 'skills/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install claude CLI
        run: |
          set -euo pipefail
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate marketplace
        run: claude plugin validate .claude-plugin/marketplace.json
