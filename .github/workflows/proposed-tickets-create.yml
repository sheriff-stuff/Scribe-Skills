# Runs after a PR that touched proposed-tickets/ is merged to master.
# Creates a GitHub issue per *.md file (sub-issues for epics) and commits the
# deletion of every file whose issue was successfully created.
#
# Required setup:
# - Settings → Actions → General → Workflow permissions: "Read and write".
# - If branch protection on `master` blocks bot pushes, allow `github-actions[bot]`
#   to bypass, or rework this workflow to open a PR instead of pushing direct.
name: Proposed tickets — create

on:
  pull_request:
    types: [closed]
    paths:
      - 'proposed-tickets/**'
      - '.github/workflows/proposed-tickets-create.yml'
      - '.github/scripts/proposed_tickets/**'

permissions:
  contents: write
  issues: write

jobs:
  create:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: .github/scripts/proposed_tickets/requirements.txt

      - name: Install dependencies
        run: pip install -r .github/scripts/proposed_tickets/requirements.txt

      - name: Create issues from proposed tickets
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONPATH: .github/scripts
        run: python -m proposed_tickets.create proposed-tickets

      - name: Commit and push file deletions
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A proposed-tickets
          if git diff --staged --quiet; then
            echo "No file deletions to commit."
            exit 0
          fi
          git commit -m "chore: clear processed tickets (#${PR_NUMBER})"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}
